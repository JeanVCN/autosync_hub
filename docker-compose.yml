services:
  backend-laravel:
    build:
      context: ./apps/backend-laravel
      dockerfile: Dockerfile
    image: autosync-hub/backend-laravel:dev
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/apps/backend-laravel
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public public/index.php
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_TIMEZONE: UTC
      APP_DISPLAY_TIMEZONE: America/Sao_Paulo
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: autosync_hub
      DB_USERNAME: autosync_hub
      DB_PASSWORD: secret
      INTEGRATION_HUB_URL: http://integration-hub-go:8080
      INTEGRATION_CALLBACK_URL: http://backend-laravel:8000/api/integration-callbacks
      INTEGRATION_CONTRACT_VERSION: "2026-07-09"
    depends_on:
      postgres:
        condition: service_healthy
      integration-hub-go:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: autosync_hub
      POSTGRES_USER: autosync_hub
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosync_hub -d autosync_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  integration-hub-go:
    image: golang:1.24-alpine
    working_dir: /app/apps/integration-hub-go
    volumes:
      - .:/app
      - /tmp/autosync-go-cache:/tmp/autosync-go-cache
    ports:
      - "8080:8080"
    command: go run ./cmd/api
    environment:
      PORT: "8080"
      GOCACHE: /tmp/autosync-go-cache
      INTEGRATION_CONTRACT_VERSION: "2026-07-09"
      CALLBACK_TIMEOUT_SECONDS: "5"
      PROVIDER_MAX_ATTEMPTS: "3"
      PROVIDER_BACKOFF_MS: "200"

volumes:
  postgres-data:
