services:
  backend-laravel:
    image: composer:2
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/apps/backend-laravel
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      INTEGRATION_HUB_URL: http://integration-hub-go:8080
